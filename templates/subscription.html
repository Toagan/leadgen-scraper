<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscription</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">
    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl overflow-hidden">
        <div class="bg-blue-600 p-6 text-center">
            <h2 class="text-white text-2xl font-bold">Pro Plan</h2>
            <p class="text-blue-100 mt-1">Unlock full potential</p>
        </div>
        <div class="p-8">
            <div class="text-center mb-6">
                <span class="text-4xl font-bold text-gray-800">$29</span>
                <span class="text-gray-500">/ month</span>
            </div>
            <ul class="space-y-3 mb-8">
                <li class="flex items-center text-gray-600"><i class="fas fa-check text-green-500 mr-3"></i> Unlimited Searches</li>
                <li class="flex items-center text-gray-600"><i class="fas fa-check text-green-500 mr-3"></i> Email Scraping</li>
                <li class="flex items-center text-gray-600"><i class="fas fa-check text-green-500 mr-3"></i> Priority Support</li>
            </ul>
            <button class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-lg transition-transform active:scale-95">
                Upgrade Now
            </button>
            <div class="mt-4 text-center">
                <a href="/" class="text-sm text-gray-400 hover:text-gray-600">Maybe later</a>
            </div>
        </div>
    </div>
</body>
</html>
