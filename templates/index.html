<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeadGen Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { background-color: #F3F4F6; font-family: 'Inter', sans-serif; color: #111827; }
        
        .card-shadow { box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1); }
        .custom-input { background-color: #F9FAFB; border: 1px solid #E5E7EB; transition: all 0.2s; }
        .custom-input:focus { background-color: #fff; border-color: #2563EB; outline: none; box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }
        
        .tab-btn { position: relative; color: #6B7280; font-weight: 500; transition: all 0.2s; cursor: pointer; }
        .tab-btn:hover { color: #1F2937; }
        .tab-btn.active { color: #2563EB; }
        .tab-btn.active::after { content: ''; position: absolute; bottom: -1px; left: 0; width: 100%; height: 2px; background-color: #2563EB; }
        
        .precision-card { border: 1px solid #E5E7EB; transition: all 0.2s; }
        .precision-card:hover { border-color: #BFDBFE; }
        .precision-card.selected { border-color: #2563EB; background-color: #EFF6FF; position: relative; }

        /* Toggle Switches */
        .toggle-checkbox:checked { right: 0; border-color: #2563EB; }
        .toggle-checkbox:checked + .toggle-label { background-color: #2563EB; }
        
        /* Dropdowns */
        .multi-select-dropdown {
            max-height: 0; opacity: 0; transition: all 0.2s ease-in-out; overflow: hidden;
            position: absolute; z-index: 50; width: 100%; background: white;
            border: 1px solid #E5E7EB; border-radius: 0.75rem; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        .multi-select-dropdown.open { max-height: 300px; opacity: 1; overflow-y: auto; margin-top: 0.5rem; }
        
        .logs-scroll::-webkit-scrollbar { width: 6px; }
        .logs-scroll::-webkit-scrollbar-track { background: #111827; }
        .logs-scroll::-webkit-scrollbar-thumb { background: #374151; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-10 px-6">

    <div class="bg-white rounded-2xl card-shadow w-full max-w-6xl overflow-hidden grid grid-cols-1 lg:grid-cols-12 min-h-[600px] mb-8">
        
        <div class="lg:col-span-7 p-8 flex flex-col border-r border-gray-100">
            <div class="flex justify-between items-center mb-6">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center text-white shadow-lg shadow-blue-200">
                        <i class="fas fa-bolt text-lg"></i>
                    </div>
                    <div>
                        <h1 class="text-xl font-bold tracking-tight text-gray-900">LeadGen Master</h1>
                        <p class="text-xs text-gray-400 font-medium uppercase tracking-wide">Professional Suite</p>
                    </div>
                </div>
                <div id="statusBadge" class="bg-gray-100 text-gray-500 text-[10px] font-bold px-3 py-1.5 rounded-full border border-gray-200">
                    System Idle
                </div>
            </div>

            <div class="flex border-b border-gray-100 mb-8 gap-6">
                <button id="tabMaps" onclick="setSource('maps')" class="tab-btn active pb-3 text-sm flex items-center gap-2">
                    <i class="fas fa-map-marked-alt"></i> Google Maps
                </button>
                <button id="tabSearch" onclick="setSource('search')" class="tab-btn pb-3 text-sm flex items-center gap-2">
                    <i class="fab fa-linkedin"></i> LinkedIn Search
                </button>
            </div>

            <div id="inputsMaps" class="space-y-6 flex-1 transition-opacity duration-300">
                <div>
                    <label class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-2">Target Niche / Keyword</label>
                    <input type="text" id="searchTerm" placeholder="e.g. Marketing Agencies, Dentists..." class="custom-input w-full px-4 py-3 rounded-xl text-sm text-gray-700 font-medium">
                </div>

                <div class="grid grid-cols-12 gap-5">
                    <div class="col-span-6">
                        <label class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-2">Limit By</label>
                        <select id="limitMode" onchange="updateLimitLabel()" class="custom-input w-full px-4 py-3 rounded-xl text-sm font-medium">
                            <option value="leads">Total Leads</option>
                            <option value="credits">Serper Credits</option>
                        </select>
                    </div>
                    <div class="col-span-6">
                        <label id="limitLabel" class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-2">Max Amount</label>
                        <input type="number" id="limitValue" value="50" class="custom-input w-full px-4 py-3 rounded-xl text-sm font-medium">
                    </div>
                </div>

                <div class="relative">
                    <label class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-2">Target Countries</label>
                    <div onclick="toggleCountryDropdown()" class="custom-input w-full px-4 py-3 rounded-xl text-sm font-medium cursor-pointer flex justify-between items-center">
                        <span id="selectedCountriesText">-- Select Countries --</span><i class="fas fa-chevron-down text-gray-400 text-xs"></i>
                    </div>
                    <div id="countryDropdownMenu" class="multi-select-dropdown">
                        <div class="p-2 space-y-1">
                            <label class="checkbox-item flex items-center px-3 py-2 rounded cursor-pointer hover:bg-gray-50"><input type="checkbox" name="country" value="de" class="w-4 h-4 text-blue-600 rounded" onchange="updateSelectedCountries()"><span class="ml-2 text-sm text-gray-700">🇩🇪 Germany</span></label>
                            <label class="checkbox-item flex items-center px-3 py-2 rounded cursor-pointer hover:bg-gray-50"><input type="checkbox" name="country" value="us" class="w-4 h-4 text-blue-600 rounded" onchange="updateSelectedCountries()"><span class="ml-2 text-sm text-gray-700">🇺🇸 USA</span></label>
                            <label class="checkbox-item flex items-center px-3 py-2 rounded cursor-pointer hover:bg-gray-50"><input type="checkbox" name="country" value="uk" class="w-4 h-4 text-blue-600 rounded" onchange="updateSelectedCountries()"><span class="ml-2 text-sm text-gray-700">🇬🇧 UK</span></label>
                            <label class="checkbox-item flex items-center px-3 py-2 rounded cursor-pointer hover:bg-gray-50"><input type="checkbox" name="country" value="fr" class="w-4 h-4 text-blue-600 rounded" onchange="updateSelectedCountries()"><span class="ml-2 text-sm text-gray-700">🇫🇷 France</span></label>
                            <label class="checkbox-item flex items-center px-3 py-2 rounded cursor-pointer hover:bg-gray-50"><input type="checkbox" name="country" value="es" class="w-4 h-4 text-blue-600 rounded" onchange="updateSelectedCountries()"><span class="ml-2 text-sm text-gray-700">🇪🇸 Spain</span></label>
                            <label class="checkbox-item flex items-center px-3 py-2 rounded cursor-pointer hover:bg-gray-50"><input type="checkbox" name="country" value="it" class="w-4 h-4 text-blue-600 rounded" onchange="updateSelectedCountries()"><span class="ml-2 text-sm text-gray-700">🇮🇹 Italy</span></label>
                        </div>
                    </div>
                </div>

                <div id="stateSection" class="hidden relative">
                    <label class="block text-[11px] font-bold text-blue-600 uppercase tracking-wider mb-2">Target States (DE Only)</label>
                    <div onclick="toggleMultiDropdown()" class="custom-input w-full px-4 py-3 rounded-xl text-sm font-medium cursor-pointer flex justify-between items-center border-blue-200 bg-blue-50/30">
                        <span id="selectedStatesText">-- All States Selected --</span><i class="fas fa-chevron-down text-gray-400 text-xs"></i>
                    </div>
                    <div id="multiDropdownMenu" class="multi-select-dropdown">
                        <div class="p-2 border-b border-gray-100 flex justify-between bg-gray-50">
                            <button onclick="selectAllStates(true)" class="text-xs text-blue-600 font-semibold">All</button>
                            <button onclick="selectAllStates(false)" class="text-xs text-gray-500">Clear</button>
                        </div>
                        <div class="p-2 space-y-1">
                            <label class="checkbox-item flex items-center px-3 py-2 rounded cursor-pointer"><input type="checkbox" name="state" value="Berlin" class="w-4 h-4 text-blue-600 rounded" onchange="updateSelectedText()"><span class="ml-2 text-sm">Berlin</span></label>
                            <label class="checkbox-item flex items-center px-3 py-2 rounded cursor-pointer"><input type="checkbox" name="state" value="Bavaria" class="w-4 h-4 text-blue-600 rounded" onchange="updateSelectedText()"><span class="ml-2 text-sm">Bavaria</span></label>
                            <label class="checkbox-item flex items-center px-3 py-2 rounded cursor-pointer"><input type="checkbox" name="state" value="Hamburg" class="w-4 h-4 text-blue-600 rounded" onchange="updateSelectedText()"><span class="ml-2 text-sm">Hamburg</span></label>
                            <label class="checkbox-item flex items-center px-3 py-2 rounded cursor-pointer"><input type="checkbox" name="state" value="North Rhine-Westphalia" class="w-4 h-4 text-blue-600 rounded" onchange="updateSelectedText()"><span class="ml-2 text-sm">NRW</span></label>
                        </div>
                    </div>
                </div>

                <div class="border-t border-gray-100 pt-5">
                    <label class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-4">Advanced Filters & Data</label>
                    <div class="grid grid-cols-2 gap-4">
                        
                        <div class="flex items-center justify-between bg-gray-50 p-3 rounded-xl border border-gray-100">
                            <span class="text-sm font-medium text-gray-700">Must have Website</span>
                            <div class="relative inline-block w-10 mr-2 align-middle select-none transition duration-200 ease-in">
                                <input type="checkbox" name="toggle" id="skipNoWebsite" class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 appearance-none cursor-pointer border-gray-300"/>
                                <label for="skipNoWebsite" class="toggle-label block overflow-hidden h-6 rounded-full bg-gray-300 cursor-pointer"></label>
                            </div>
                        </div>

                        <div class="flex items-center justify-between bg-gray-50 p-3 rounded-xl border border-gray-100">
                            <span class="text-sm font-medium text-gray-700">Extract Emails</span>
                            <div class="relative inline-block w-10 mr-2 align-middle select-none transition duration-200 ease-in">
                                <input type="checkbox" name="toggle" id="scrapeEmails" class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 appearance-none cursor-pointer border-gray-300"/>
                                <label for="scrapeEmails" class="toggle-label block overflow-hidden h-6 rounded-full bg-gray-300 cursor-pointer"></label>
                            </div>
                        </div>

                        <div class="col-span-2">
                            <label class="text-xs text-gray-500 font-medium mb-1 block">Minimum Google Rating</label>
                            <select id="minRating" class="custom-input w-full px-3 py-2 rounded-lg text-sm font-medium">
                                <option value="0">No Minimum (All)</option>
                                <option value="3.0">3.0+ Stars</option>
                                <option value="4.0">4.0+ Stars</option>
                                <option value="4.5">4.5+ Stars</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <div id="inputsSearch" class="hidden space-y-6 flex-1">
                <div class="border-2 border-dashed border-gray-200 rounded-xl p-6 text-center hover:bg-gray-50 transition-colors relative">
                    <input type="file" id="csvFile" accept=".csv, .xlsx" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" onchange="uploadCSV()">
                    <div id="uploadText"><i class="fas fa-cloud-upload-alt text-3xl text-gray-300 mb-2"></i><p class="text-sm font-medium text-gray-600">Drop CSV or Excel here</p></div>
                </div>
                <div><label class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-2">Target Companies</label><textarea id="companyList" placeholder="example.com" class="custom-input w-full px-4 py-3 rounded-xl text-sm font-mono h-32 resize-none"></textarea></div>
                <div><label class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-2">Roles</label><input type="text" id="roleList" value="CEO" class="custom-input w-full px-4 py-3 rounded-xl text-sm font-medium"></div>
                <div><label class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-2">Limit</label><input type="number" id="linkedinLimit" value="100" class="custom-input w-full px-4 py-3 rounded-xl text-sm font-medium"></div>
            </div>

            <div class="mt-8 pt-6 border-t border-gray-100">
                <button id="runBtn" onclick="startScrape()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-4 rounded-xl shadow-lg transition-all flex items-center justify-center gap-2">
                    <i class="fas fa-play text-xs"></i> Generate Leads
                </button>
            </div>
        </div>

        <div class="lg:col-span-5 bg-gray-900 p-8 flex flex-col border-l border-gray-800">
            <div class="flex justify-between items-center mb-6">
                <div class="text-gray-400 text-xs font-mono uppercase tracking-widest">Live Terminal</div>
                <div class="flex gap-2">
                    <div id="creditsCounter" class="text-xs font-mono font-bold text-purple-400 bg-purple-900/30 px-2 py-1 rounded border border-purple-800">0 CR</div>
                    <div id="counter" class="text-xs font-mono font-bold text-emerald-400 bg-emerald-900/30 px-2 py-1 rounded border border-emerald-800">Ready</div>
                </div>
            </div>
            <div id="consoleOutput" class="flex-1 logs-scroll overflow-y-auto font-mono text-xs space-y-3 pr-2"><div class="text-gray-500">Waiting for command...</div></div>
            <div id="downloadContainer" class="mt-6 pt-6 border-t border-gray-800 hidden">
                <button id="downloadBtn" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-semibold py-3 rounded-lg flex items-center justify-center gap-2"><i class="fas fa-download"></i> Download CSV</button>
            </div>
        </div>
    </div>

    <script>
        let source = 'maps';
        let pollingInterval = null;

        window.onload = function() {
            updateLimitLabel();
            document.addEventListener('click', function(e) {
                if(!e.target.closest('#multiDropdownMenu') && !e.target.closest('#stateSection')) document.getElementById('multiDropdownMenu').classList.remove('open');
                if(!e.target.closest('#countryDropdownMenu') && !e.target.closest('.relative')) document.getElementById('countryDropdownMenu').classList.remove('open');
            });
        };

        function setSource(src) {
            source = src;
            const btnMaps = document.getElementById('tabMaps'); const btnSearch = document.getElementById('tabSearch');
            const inMaps = document.getElementById('inputsMaps'); const inSearch = document.getElementById('inputsSearch');
            if(src === 'maps') {
                btnMaps.classList.add('active'); btnSearch.classList.remove('active');
                inMaps.classList.remove('hidden'); inSearch.classList.add('hidden');
            } else {
                btnSearch.classList.add('active'); btnMaps.classList.remove('active');
                inMaps.classList.add('hidden'); inSearch.classList.remove('hidden');
            }
        }

        async function uploadCSV() {
            const file = document.getElementById('csvFile').files[0]; if(!file) return;
            const formData = new FormData(); formData.append('file', file);
            document.getElementById('uploadText').innerHTML = `<i class="fas fa-spinner fa-spin text-blue-500"></i> Parsing...`;
            try {
                const res = await fetch('/upload-csv', { method: 'POST', body: formData });
                const data = await res.json();
                if(data.status === 'success') {
                    document.getElementById('companyList').value = data.domains.join('\n');
                    document.getElementById('uploadText').innerHTML = `<i class="fas fa-check text-green-500"></i> ${data.count} Loaded`;
                } else alert(data.error);
            } catch(e) { alert("Upload failed"); }
        }

        function toggleCountryDropdown() { document.getElementById('countryDropdownMenu').classList.toggle('open'); }
        function updateSelectedCountries() {
            const cbs = document.querySelectorAll('input[name="country"]:checked');
            const txt = document.getElementById('selectedCountriesText');
            txt.innerText = cbs.length === 0 ? "-- Select Countries --" : `${cbs.length} Selected`;
            if(Array.from(cbs).map(c=>c.value).includes('de')) document.getElementById('stateSection').classList.remove('hidden');
            else document.getElementById('stateSection').classList.add('hidden');
        }
        function getSelectedCountries() { return Array.from(document.querySelectorAll('input[name="country"]:checked')).map(c=>c.value); }

        function toggleMultiDropdown() { document.getElementById('multiDropdownMenu').classList.toggle('open'); }
        function selectAllStates(select) { document.querySelectorAll('input[name="state"]').forEach(cb => cb.checked = select); updateSelectedText(); }
        function updateSelectedText() {
            const cbs = document.querySelectorAll('input[name="state"]:checked');
            document.getElementById('selectedStatesText').innerText = cbs.length === 0 ? "-- All States --" : `${cbs.length} Selected`;
        }
        function getSelectedStates() { return Array.from(document.querySelectorAll('input[name="state"]:checked')).map(c=>c.value); }

        function updateLimitLabel() {
            const mode = document.getElementById('limitMode').value;
            const lbl = document.getElementById('limitLabel');
            const inp = document.getElementById('limitValue');
            lbl.innerText = mode === 'leads' ? "Target Leads" : "Max Credits";
            inp.placeholder = mode === 'leads' ? "e.g. 50" : "e.g. 100";
        }

        function log(msg, type='system') {
            const d = document.getElementById('consoleOutput');
            const l = document.createElement('div');
            l.innerHTML = type==='success' ? `<span class="text-emerald-500">➜</span> ${msg}` : `<span class="text-blue-500">INFO:</span> ${msg}`;
            d.appendChild(l); d.scrollTop = d.scrollHeight;
        }

        async function startScrape() {
            document.getElementById('consoleOutput').innerHTML = '';
            document.getElementById('downloadContainer').classList.add('hidden');
            const btn = document.getElementById('runBtn');
            btn.disabled = true; btn.classList.add('opacity-75'); btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';

            try {
                if (source === 'maps') {
                    const term = document.getElementById('searchTerm').value;
                    const countries = getSelectedCountries();
                    if(!term) throw new Error("Enter a keyword");
                    if(countries.length === 0) throw new Error("Select a country");
                    
                    await fetch('/run-scrape', {
                        method: 'POST', headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ 
                            search_term: term, limit_value: document.getElementById('limitValue').value,
                            limit_mode: document.getElementById('limitMode').value, match_type: 'rough',
                            region: countries, sub_region: getSelectedStates(),
                            skip_no_website: document.getElementById('skipNoWebsite').checked,
                            scrape_emails: document.getElementById('scrapeEmails').checked,
                            min_rating: document.getElementById('minRating').value
                        })
                    });
                } else {
                    const companies = document.getElementById('companyList').value.split('\n').filter(x => x.trim());
                    const roles = document.getElementById('roleList').value.split(',').filter(x => x.trim());
                    if(companies.length === 0) throw new Error("No companies provided");
                    await fetch('/run-linkedin-scrape', {
                        method: 'POST', headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ companies, roles, limit: document.getElementById('linkedinLimit').value })
                    });
                }
                startPolling();
            } catch(e) {
                alert(e.message);
                btn.disabled = false; btn.classList.remove('opacity-75'); btn.innerHTML = 'Generate Leads';
            }
        }

        function startPolling() {
            if(pollingInterval) clearInterval(pollingInterval);
            pollingInterval = setInterval(async () => {
                const res = await fetch('/status');
                const stat = await res.json();
                document.getElementById('counter').innerText = `${stat.total_leads} LEADS`;
                document.getElementById('creditsCounter').innerText = `${stat.api_calls} CR`;
                document.getElementById('statusBadge').innerText = stat.is_running ? "Running..." : "Idle";
                if(stat.new_logs.length) stat.new_logs.forEach(m => log(m, 'success'));
                if(!stat.is_running) {
                    clearInterval(pollingInterval);
                    const btn = document.getElementById('runBtn');
                    btn.disabled = false; btn.classList.remove('opacity-75'); btn.innerHTML = 'Generate Leads';
                    if(stat.total_leads > 0) {
                        document.getElementById('downloadContainer').classList.remove('hidden');
                        document.getElementById('downloadBtn').onclick = () => window.location.href = `/download/${stat.current_filename}`;
                    }
                }
            }, 2000);
        }
    </script>
</body>
</html>
