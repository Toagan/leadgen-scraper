<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blue Reach Agency</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { background-color: #F8FAFC; font-family: 'Inter', sans-serif; color: #1E293B; overflow: hidden; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 3px; }
        .custom-input { background-color: #F8FAFC; border: 1px solid #E2E8F0; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .custom-input:focus { background-color: #fff; border-color: #3B82F6; outline: none; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }
        @keyframes wave { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        @keyframes fadeOut { 0% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }
        .animate-wave { animation: wave 3s infinite ease-in-out; }
        .loader-fade { animation: fadeOut 0.6s ease-out 2.5s forwards; }
        .tab-btn { position: relative; color: #64748B; font-weight: 500; transition: all 0.2s; }
        .tab-btn.active { color: #3B82F6; }
        .tab-btn.active::after { content: ''; position: absolute; bottom: -8px; left: 0; width: 100%; height: 2px; background-color: #3B82F6; border-radius: 2px; }
        .multi-select-dropdown { max-height: 0; opacity: 0; transition: all 0.2s ease-in-out; overflow: hidden; position: absolute; z-index: 50; width: 100%; background: white; border: 1px solid #E2E8F0; border-radius: 0.75rem; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .multi-select-dropdown.open { max-height: 300px; opacity: 1; overflow-y: auto; margin-top: 0.5rem; }
    </style>
</head>
<body class="h-screen flex flex-col">

    <script>const IS_LOGGED_IN = {{ 'true' if user.is_authenticated else 'false' }};</script>

    <div id="loader" class="fixed inset-0 bg-white z-[9999] flex flex-col items-center justify-center loader-fade">
        <div class="text-center animate-wave">
            <h1 class="text-7xl font-extrabold text-slate-900 tracking-tighter mb-4">Blue<span class="text-blue-600">Reach</span></h1>
            <p class="text-xl text-slate-500 font-medium tracking-wide">Scale your revenue operations</p>
        </div>
    </div>

    <div class="flex-1 grid grid-cols-12 h-full overflow-hidden">
        
        <div class="col-span-12 lg:col-span-7 xl:col-span-8 bg-white border-r border-slate-200 flex flex-col h-full overflow-y-auto">
            <div class="px-10 py-8 border-b border-slate-100 flex justify-between items-center sticky top-0 bg-white/95 backdrop-blur z-20">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-blue-200">
                        <i class="fas fa-water text-lg"></i>
                    </div>
                    <div>
                        <h1 class="text-xl font-bold tracking-tight text-slate-900">Blue Reach</h1>
                        <div class="flex items-center gap-2">
                            <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">System Online</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="p-10 max-w-4xl mx-auto w-full flex-1 space-y-8">
                
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2.5">Target Industry</label>
                    <div class="relative group">
                        <i class="fas fa-search absolute left-4 top-4 text-slate-400 group-focus-within:text-blue-500 transition-colors"></i>
                        <input type="text" id="searchTerm" placeholder="e.g. Roofers, SaaS Startups, Cafes..." class="custom-input w-full pl-11 pr-4 py-3.5 rounded-xl text-sm font-medium text-slate-700">
                    </div>
                </div>

                <div class="grid grid-cols-12 gap-6">
                    <div class="col-span-6">
                        <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2.5">Limit Strategy</label>
                        <div class="relative">
                            <select id="limitMode" onchange="updateLimitLabel()" class="custom-input w-full px-4 py-3.5 rounded-xl text-sm font-medium appearance-none cursor-pointer text-slate-700">
                                <option value="leads">Total Leads</option>
                                <option value="credits">API Credits</option>
                            </select>
                            <i class="fas fa-chevron-down absolute right-4 top-4 text-slate-400 text-xs pointer-events-none"></i>
                        </div>
                    </div>
                    <div class="col-span-6">
                        <label id="limitLabel" class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2.5">Max Amount</label>
                        <input type="number" id="limitValue" value="50" class="custom-input w-full px-4 py-3.5 rounded-xl text-sm font-medium text-slate-700">
                    </div>
                </div>

                <div class="relative">
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2.5">Target Markets</label>
                    <div onclick="toggleCountryDropdown()" class="custom-input w-full px-4 py-3.5 rounded-xl text-sm font-medium cursor-pointer flex justify-between items-center text-slate-700 hover:border-blue-300">
                        <span id="selectedCountriesText">-- Select Countries --</span>
                        <i class="fas fa-globe text-slate-400"></i>
                    </div>
                    <div id="countryDropdownMenu" class="multi-select-dropdown shadow-xl border-slate-200">
                        <div class="p-2 space-y-1 max-h-60 overflow-y-auto">
                            <label class="checkbox-item flex items-center px-3 py-2.5 hover:bg-slate-50 rounded-lg cursor-pointer transition-colors"><input type="checkbox" name="country" value="de" class="w-4 h-4 text-blue-600 rounded border-slate-300" onchange="updateSelectedCountries()"><span class="ml-3 text-sm font-medium text-slate-700">🇩🇪 Germany</span></label>
                            <label class="checkbox-item flex items-center px-3 py-2.5 hover:bg-slate-50 rounded-lg cursor-pointer transition-colors"><input type="checkbox" name="country" value="us" class="w-4 h-4 text-blue-600 rounded border-slate-300" onchange="updateSelectedCountries()"><span class="ml-3 text-sm font-medium text-slate-700">🇺🇸 USA</span></label>
                            <label class="checkbox-item flex items-center px-3 py-2.5 hover:bg-slate-50 rounded-lg cursor-pointer transition-colors"><input type="checkbox" name="country" value="uk" class="w-4 h-4 text-blue-600 rounded border-slate-300" onchange="updateSelectedCountries()"><span class="ml-3 text-sm font-medium text-slate-700">🇬🇧 UK</span></label>
                            <label class="checkbox-item flex items-center px-3 py-2.5 hover:bg-slate-50 rounded-lg cursor-pointer transition-colors"><input type="checkbox" name="country" value="fr" class="w-4 h-4 text-blue-600 rounded border-slate-300" onchange="updateSelectedCountries()"><span class="ml-3 text-sm font-medium text-slate-700">🇫🇷 France</span></label>
                            <label class="checkbox-item flex items-center px-3 py-2.5 hover:bg-slate-50 rounded-lg cursor-pointer transition-colors"><input type="checkbox" name="country" value="es" class="w-4 h-4 text-blue-600 rounded border-slate-300" onchange="updateSelectedCountries()"><span class="ml-3 text-sm font-medium text-slate-700">🇪🇸 Spain</span></label>
                            <label class="checkbox-item flex items-center px-3 py-2.5 hover:bg-slate-50 rounded-lg cursor-pointer transition-colors"><input type="checkbox" name="country" value="it" class="w-4 h-4 text-blue-600 rounded border-slate-300" onchange="updateSelectedCountries()"><span class="ml-3 text-sm font-medium text-slate-700">🇮🇹 Italy</span></label>
                        </div>
                    </div>
                </div>

                <div id="stateSection" class="hidden relative animate-fade-in-down">
                    <label class="block text-xs font-bold text-blue-600 uppercase tracking-wider mb-2.5">Target States (DE)</label>
                    <div onclick="toggleMultiDropdown()" class="custom-input w-full px-4 py-3.5 rounded-xl text-sm font-medium cursor-pointer flex justify-between items-center border-blue-200 bg-blue-50/30 text-slate-700">
                        <span id="selectedStatesText">-- All States --</span>
                        <i class="fas fa-map text-blue-400"></i>
                    </div>
                    <div id="multiDropdownMenu" class="multi-select-dropdown shadow-xl border-blue-100">
                        <div class="p-2 space-y-1">
                            <label class="checkbox-item flex items-center px-3 py-2.5 hover:bg-blue-50 rounded-lg cursor-pointer transition-colors"><input type="checkbox" name="state" value="Berlin" class="w-4 h-4 text-blue-600 rounded border-slate-300" onchange="updateSelectedText()"><span class="ml-3 text-sm font-medium text-slate-700">Berlin</span></label>
                            <label class="checkbox-item flex items-center px-3 py-2.5 hover:bg-blue-50 rounded-lg cursor-pointer transition-colors"><input type="checkbox" name="state" value="Bavaria" class="w-4 h-4 text-blue-600 rounded border-slate-300" onchange="updateSelectedText()"><span class="ml-3 text-sm font-medium text-slate-700">Bavaria</span></label>
                        </div>
                    </div>
                </div>

                <div class="mt-12 pt-6 border-t border-slate-100">
                    <button id="runBtn" onclick="startScrape()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 px-8 rounded-xl shadow-lg shadow-blue-200 transition-all transform hover:-translate-y-0.5 active:scale-95 flex items-center justify-center gap-2.5">
                        <i class="fas fa-rocket"></i> Launch Scraper
                    </button>
                </div>
                
                <div class="text-center mt-4">
                    <button onclick="document.getElementById('featureModal').classList.remove('hidden')" class="text-xs font-medium text-slate-400 hover:text-blue-600 transition-colors">
                        <i class="far fa-lightbulb mr-1"></i> Request Feature / Source
                    </button>
                </div>
            </div>
        </div>

        <div class="col-span-12 lg:col-span-5 xl:col-span-4 bg-[#0F172A] text-slate-300 flex flex-col h-full border-l border-slate-800 shadow-2xl relative z-10">
            <div class="p-6 border-b border-slate-800 flex justify-between items-center bg-[#0F172A]">
                <div class="flex items-center gap-3">
                    <div class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
                    <span class="text-xs font-mono font-bold tracking-widest text-slate-500 uppercase">Live Terminal</span>
                </div>
                <div class="flex gap-3">
                    <div id="creditsCounter" class="text-[10px] font-mono font-bold text-purple-400 bg-purple-500/10 px-2.5 py-1 rounded border border-purple-500/20 backdrop-blur-sm">0 CR</div>
                    <div id="counter" class="text-[10px] font-mono font-bold text-emerald-400 bg-emerald-500/10 px-2.5 py-1 rounded border border-emerald-500/20 backdrop-blur-sm">Ready</div>
                </div>
            </div>
            
            <div id="consoleOutput" class="flex-1 p-6 overflow-y-auto font-mono text-xs space-y-3 scroll-smooth">
                <div class="opacity-50"><span class="text-blue-500">sys@bluereach:~$</span> system initialized...</div>
                <div class="opacity-50"><span class="text-blue-500">sys@bluereach:~$</span> waiting for input...</div>
            </div>

            <div id="downloadContainer" class="p-6 border-t border-slate-800 bg-[#0F172A] hidden">
                <button id="downloadBtn" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-4 rounded-xl flex items-center justify-center gap-3 text-sm shadow-lg shadow-emerald-900/50 transition-all transform hover:-translate-y-0.5">
                    <i class="fas fa-download"></i> Download Exported Data
                </button>
            </div>
        </div>
    </div>

    <div id="featureModal" class="hidden fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-[10000] flex items-center justify-center p-4 transition-opacity">
        <div class="bg-white rounded-2xl shadow-2xl max-w-md w-full p-8 transform transition-all scale-100">
            <div class="flex justify-between items-start mb-4">
                <h3 class="text-xl font-bold text-slate-900">Request Source</h3>
                <button onclick="document.getElementById('featureModal').classList.add('hidden')" class="text-slate-400 hover:text-slate-600"><i class="fas fa-times"></i></button>
            </div>
            <p class="text-sm text-slate-500 mb-6">What other data sources or websites should we integrate next?</p>
            <textarea id="featureText" class="w-full border border-slate-200 rounded-xl p-4 text-sm focus:border-blue-500 focus:outline-none mb-6 h-32 resize-none" placeholder="e.g. Scrape Instagram, YellowPages, or Trustpilot..."></textarea>
            <div class="flex justify-end gap-3">
                <button onclick="document.getElementById('featureModal').classList.add('hidden')" class="px-5 py-2.5 text-sm font-medium text-slate-500 hover:bg-slate-50 rounded-xl transition-colors">Cancel</button>
                <button onclick="submitFeature()" class="px-5 py-2.5 text-sm font-bold bg-blue-600 text-white rounded-xl hover:bg-blue-700 shadow-md transition-all">Submit Request</button>
            </div>
        </div>
    </div>

    <script>
        let pollingInterval = null;
        setTimeout(() => { const l=document.getElementById('loader'); if(l) l.style.display='none'; }, 3300);

        window.onload = function() {
            updateLimitLabel();
            document.addEventListener('click', function(e) {
                if(!e.target.closest('#multiDropdownMenu') && !e.target.closest('#stateSection')) document.getElementById('multiDropdownMenu').classList.remove('open');
                if(!e.target.closest('#countryDropdownMenu') && !e.target.closest('.relative')) document.getElementById('countryDropdownMenu').classList.remove('open');
            });
        };

        async function submitFeature() {
            const t = document.getElementById('featureText').value; if(!t) return;
            try { await fetch('/request-feature', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({feature_text:t}) }); alert("Request Sent!"); document.getElementById('featureModal').classList.add('hidden'); } catch(e){}
        }

        function toggleCountryDropdown() { document.getElementById('countryDropdownMenu').classList.toggle('open'); }
        function updateSelectedCountries() {
            const c=document.querySelectorAll('input[name="country"]:checked');
            document.getElementById('selectedCountriesText').innerText=c.length===0?"-- Select --":`${c.length} Selected`;
            if(Array.from(c).map(x=>x.value).includes('de')) document.getElementById('stateSection').classList.remove('hidden'); else document.getElementById('stateSection').classList.add('hidden');
        }
        function getSelectedCountries(){ return Array.from(document.querySelectorAll('input[name="country"]:checked')).map(x=>x.value); }

        function toggleMultiDropdown() { document.getElementById('multiDropdownMenu').classList.toggle('open'); }
        function updateSelectedText() { const c=document.querySelectorAll('input[name="state"]:checked').length; document.getElementById('selectedStatesText').innerText=c===0?"-- All --":`${c} Selected`; }
        function getSelectedStates(){ return Array.from(document.querySelectorAll('input[name="state"]:checked')).map(x=>x.value); }
        
        function updateLimitLabel(){ const m=document.getElementById('limitMode').value; document.getElementById('limitLabel').innerText=m==='leads'?"Target Leads":"Max Credits"; document.getElementById('limitValue').placeholder=m==='leads'?"50":"100"; }
        function log(m,t='s'){ const d=document.getElementById('consoleOutput'); const l=document.createElement('div'); l.className="transition-all duration-300 ease-out transform translate-y-2 opacity-0 animate-slide-in"; l.innerHTML=t==='success'?`<span class="text-emerald-400">➜</span> ${m}`:`<span class="text-blue-400">INFO:</span> ${m}`; d.appendChild(l); requestAnimationFrame(() => { l.classList.remove('translate-y-2', 'opacity-0'); }); d.scrollTop=d.scrollHeight; }

        async function startScrape() {
            document.getElementById('consoleOutput').innerHTML='';
            document.getElementById('downloadContainer').classList.add('hidden');
            const btn=document.getElementById('runBtn'); btn.disabled=true; btn.classList.add('opacity-75'); btn.innerHTML='<i class="fas fa-spinner fa-spin"></i> Processing...';
            try {
                const t=document.getElementById('searchTerm').value; const c=getSelectedCountries();
                if(!t) throw new Error("Enter keyword"); if(c.length===0) throw new Error("Select country");
                
                await fetch('/run-scrape',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
                    search_term:t, limit_value:document.getElementById('limitValue').value, limit_mode:document.getElementById('limitMode').value,
                    match_type:'rough', region:c, sub_region:getSelectedStates(), skip_no_website:false,
                    scrape_emails:false, min_rating:0
                })});
                startPolling();
            } catch(e){ alert(e.message); btn.disabled=false; btn.classList.remove('opacity-75'); btn.innerHTML='<i class="fas fa-rocket"></i> Launch Scraper'; }
        }

        function startPolling(){
            if(pollingInterval) clearInterval(pollingInterval);
            pollingInterval=setInterval(async()=>{
                const r=await fetch('/status'); const s=await r.json();
                document.getElementById('counter').innerText=`${s.total_leads} LEADS`; document.getElementById('creditsCounter').innerText=`${s.api_calls} CR`;
                if(s.new_logs.length) s.new_logs.forEach(m=>log(m,'success'));
                if(!s.is_running){ clearInterval(pollingInterval); document.getElementById('runBtn').disabled=false; document.getElementById('runBtn').classList.remove('opacity-75'); document.getElementById('runBtn').innerHTML='<i class="fas fa-rocket"></i> Launch Scraper'; if(s.total_leads>0){ document.getElementById('downloadContainer').classList.remove('hidden'); document.getElementById('downloadBtn').onclick=()=>window.location.href=`/download/${s.current_filename}`; } }
            },2000);
        }
    </script>
</body>
</html>
