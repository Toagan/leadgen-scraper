<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blue Reach Agency</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { background-color: #F8FAFC; font-family: 'Inter', sans-serif; color: #1E293B; overflow: hidden; }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94A3B8; }

        .custom-input { background-color: #F8FAFC; border: 1px solid #E2E8F0; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .custom-input:focus { background-color: #fff; border-color: #3B82F6; outline: none; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }
        
        /* Animations */
        @keyframes wave { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        @keyframes fadeOut { 0% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .animate-wave { animation: wave 3s infinite ease-in-out; }
        .loader-fade { animation: fadeOut 0.6s ease-out 2.5s forwards; }
        .animate-row { animation: slideIn 0.3s ease-out forwards; }

        /* UI Components */
        .tab-btn { position: relative; color: #64748B; font-weight: 500; transition: all 0.2s; }
        .tab-btn:hover { color: #1E293B; }
        .tab-btn.active { color: #3B82F6; }
        .tab-btn.active::after { content: ''; position: absolute; bottom: -8px; left: 0; width: 100%; height: 2px; background-color: #3B82F6; border-radius: 2px; }
        
        .toggle-checkbox:checked { right: 0; border-color: #3B82F6; }
        .toggle-checkbox:checked + .toggle-label { background-color: #3B82F6; }
        
        .multi-select-dropdown { max-height: 0; opacity: 0; transition: all 0.2s ease-in-out; overflow: hidden; position: absolute; z-index: 50; width: 100%; background: white; border: 1px solid #E2E8F0; border-radius: 0.75rem; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .multi-select-dropdown.open { max-height: 300px; opacity: 1; overflow-y: auto; margin-top: 0.5rem; }

        #drag-handle { width: 6px; cursor: col-resize; background-color: #F1F5F9; transition: background-color 0.2s; z-index: 50; }
        #drag-handle:hover, #drag-handle.dragging { background-color: #3B82F6; }
    </style>
</head>
<body class="h-screen flex flex-col select-none">

    <div id="loader" class="fixed inset-0 bg-white z-[9999] flex flex-col items-center justify-center loader-fade">
        <div class="text-center animate-wave">
            <h1 class="text-7xl font-extrabold text-slate-900 tracking-tighter mb-4">Blue<span class="text-blue-600">Reach</span></h1>
            <p class="text-xl text-slate-500 font-medium tracking-wide">Scale your revenue operations</p>
        </div>
    </div>

    <div class="flex-1 flex h-full overflow-hidden w-full" id="split-container">
        
        <div id="left-panel" class="bg-white border-r border-slate-200 flex flex-col h-full overflow-y-auto" style="width: 40%; min-width: 350px;">
            
            <div class="px-8 py-6 border-b border-slate-100 flex justify-between items-center sticky top-0 bg-white/95 backdrop-blur z-20">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white shadow-lg">
                        <i class="fas fa-water"></i>
                    </div>
                    <h1 class="text-lg font-bold text-slate-900">Blue Reach</h1>
                </div>
                
                <div class="text-xs text-slate-400 font-medium uppercase tracking-widest">
                    Admin Console
                </div>
            </div>

            <div class="p-8 max-w-xl mx-auto w-full flex-1">
                
                <div class="space-y-8">
                    <div>
                        <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2.5">Target Industry</label>
                        <div class="relative group">
                            <i class="fas fa-search absolute left-4 top-4 text-slate-400 group-focus-within:text-blue-500 transition-colors"></i>
                            <input type="text" id="searchTerm" placeholder="e.g. Roofers, SaaS Startups, Cafes..." class="custom-input w-full pl-11 pr-4 py-3.5 rounded-xl text-sm font-medium text-slate-700">
                        </div>
                    </div>

                    <div class="grid grid-cols-12 gap-6">
                        <div class="col-span-6">
                            <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2.5">Limit Strategy</label>
                            <div class="relative">
                                <select id="limitMode" onchange="updateLimitLabel()" class="custom-input w-full px-4 py-3.5 rounded-xl text-sm font-medium appearance-none cursor-pointer text-slate-700">
                                    <option value="leads">Total Leads</option>
                                    <option value="credits">API Credits</option>
                                </select>
                                <i class="fas fa-chevron-down absolute right-4 top-4 text-slate-400 text-xs pointer-events-none"></i>
                            </div>
                        </div>
                        
                        <div class="col-span-6">
                            <div class="flex justify-between items-center mb-2.5">
                                <label id="limitLabel" class="block text-xs font-bold text-slate-400 uppercase tracking-wider">Max Amount</label>
                                <div class="flex items-center gap-2">
                                    <input type="checkbox" id="unlimitedCheck" onchange="toggleUnlimited()" class="w-3 h-3 text-blue-600 rounded border-slate-300 focus:ring-blue-500 cursor-pointer">
                                    <label for="unlimitedCheck" class="text-[10px] font-bold text-blue-600 uppercase cursor-pointer select-none">As much as possible</label>
                                </div>
                            </div>
                            <input type="number" id="limitValue" value="50" class="custom-input w-full px-4 py-3.5 rounded-xl text-sm font-medium text-slate-700 transition-all">
                        </div>
                    </div>

                    <div class="relative">
                        <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2.5">Target Markets</label>
                        <div onclick="toggleCountryDropdown()" class="custom-input w-full px-4 py-3.5 rounded-xl text-sm font-medium cursor-pointer flex justify-between items-center text-slate-700 hover:border-blue-300">
                            <span id="selectedCountriesText">-- Select Countries --</span>
                            <i class="fas fa-globe text-slate-400"></i>
                        </div>
                        <div id="countryDropdownMenu" class="multi-select-dropdown shadow-xl border-slate-200">
                            <div class="p-2 space-y-1 max-h-60 overflow-y-auto custom-scrollbar">
                                <label class="checkbox-item flex items-center px-3 py-2.5 hover:bg-slate-50 rounded-lg cursor-pointer transition-colors"><input type="checkbox" name="country" value="de" class="w-4 h-4 text-blue-600 rounded border-slate-300" onchange="updateSelectedCountries()"><span class="ml-3 text-sm font-medium text-slate-700">🇩🇪 Germany</span></label>
                                <label class="checkbox-item flex items-center px-3 py-2.5 hover:bg-slate-50 rounded-lg cursor-pointer transition-colors"><input type="checkbox" name="country" value="us" class="w-4 h-4 text-blue-600 rounded border-slate-300" onchange="updateSelectedCountries()"><span class="ml-3 text-sm font-medium text-slate-700">🇺🇸 USA</span></label>
                                <label class="checkbox-item flex items-center px-3 py-2.5 hover:bg-slate-50 rounded-lg cursor-pointer transition-colors"><input type="checkbox" name="country" value="uk" class="w-4 h-4 text-blue-600 rounded border-slate-300" onchange="updateSelectedCountries()"><span class="ml-3 text-sm font-medium text-slate-700">🇬🇧 UK</span></label>
                                <label class="checkbox-item flex items-center px-3 py-2.5 hover:bg-slate-50 rounded-lg cursor-pointer transition-colors"><input type="checkbox" name="country" value="fr" class="w-4 h-4 text-blue-600 rounded border-slate-300" onchange="updateSelectedCountries()"><span class="ml-3 text-sm font-medium text-slate-700">🇫🇷 France</span></label>
                                <label class="checkbox-item flex items-center px-3 py-2.5 hover:bg-slate-50 rounded-lg cursor-pointer transition-colors"><input type="checkbox" name="country" value="es" class="w-4 h-4 text-blue-600 rounded border-slate-300" onchange="updateSelectedCountries()"><span class="ml-3 text-sm font-medium text-slate-700">🇪🇸 Spain</span></label>
                                <label class="checkbox-item flex items-center px-3 py-2.5 hover:bg-slate-50 rounded-lg cursor-pointer transition-colors"><input type="checkbox" name="country" value="it" class="w-4 h-4 text-blue-600 rounded border-slate-300" onchange="updateSelectedCountries()"><span class="ml-3 text-sm font-medium text-slate-700">🇮🇹 Italy</span></label>
                                <label class="checkbox-item flex items-center px-3 py-2.5 hover:bg-slate-50 rounded-lg cursor-pointer transition-colors"><input type="checkbox" name="country" value="ca" class="w-4 h-4 text-blue-600 rounded border-slate-300" onchange="updateSelectedCountries()"><span class="ml-3 text-sm font-medium text-slate-700">🇨🇦 Canada</span></label>
                                <label class="checkbox-item flex items-center px-3 py-2.5 hover:bg-slate-50 rounded-lg cursor-pointer transition-colors"><input type="checkbox" name="country" value="au" class="w-4 h-4 text-blue-600 rounded border-slate-300" onchange="updateSelectedCountries()"><span class="ml-3 text-sm font-medium text-slate-700">🇦🇺 Australia</span></label>
                                <label class="checkbox-item flex items-center px-3 py-2.5 hover:bg-slate-50 rounded-lg cursor-pointer transition-colors"><input type="checkbox" name="country" value="ch" class="w-4 h-4 text-blue-600 rounded border-slate-300" onchange="updateSelectedCountries()"><span class="ml-3 text-sm font-medium text-slate-700">🇨🇭 Switzerland</span></label>
                                <label class="checkbox-item flex items-center px-3 py-2.5 hover:bg-slate-50 rounded-lg cursor-pointer transition-colors"><input type="checkbox" name="country" value="br" class="w-4 h-4 text-blue-600 rounded border-slate-300" onchange="updateSelectedCountries()"><span class="ml-3 text-sm font-medium text-slate-700">🇧🇷 Brazil</span></label>
                                <label class="checkbox-item flex items-center px-3 py-2.5 hover:bg-slate-50 rounded-lg cursor-pointer transition-colors"><input type="checkbox" name="country" value="cn" class="w-4 h-4 text-blue-600 rounded border-slate-300" onchange="updateSelectedCountries()"><span class="ml-3 text-sm font-medium text-slate-700">🇨🇳 China</span></label>
                                <label class="checkbox-item flex items-center px-3 py-2.5 hover:bg-slate-50 rounded-lg cursor-pointer transition-colors"><input type="checkbox" name="country" value="in" class="w-4 h-4 text-blue-600 rounded border-slate-300" onchange="updateSelectedCountries()"><span class="ml-3 text-sm font-medium text-slate-700">🇮🇳 India</span></label>
                                <label class="checkbox-item flex items-center px-3 py-2.5 hover:bg-slate-50 rounded-lg cursor-pointer transition-colors"><input type="checkbox" name="country" value="jp" class="w-4 h-4 text-blue-600 rounded border-slate-300" onchange="updateSelectedCountries()"><span class="ml-3 text-sm font-medium text-slate-700">🇯🇵 Japan</span></label>
                                <label class="checkbox-item flex items-center px-3 py-2.5 hover:bg-slate-50 rounded-lg cursor-pointer transition-colors"><input type="checkbox" name="country" value="ru" class="w-4 h-4 text-blue-600 rounded border-slate-300" onchange="updateSelectedCountries()"><span class="ml-3 text-sm font-medium text-slate-700">🇷🇺 Russia</span></label>
                            </div>
                        </div>
                    </div>

                    <div id="stateSection" class="hidden relative animate-fade-in-down">
                        <label class="block text-xs font-bold text-blue-600 uppercase tracking-wider mb-2.5">Target States (DE)</label>
                        <div onclick="toggleMultiDropdown()" class="custom-input w-full px-4 py-3.5 rounded-xl text-sm font-medium cursor-pointer flex justify-between items-center border-blue-200 bg-blue-50/30 text-slate-700">

                            <i class="fas fa-map text-blue-400"></i>
                        </div>
                        <div id="multiDropdownMenu" class="multi-select-dropdown shadow-xl border-blue-100">
                            <div class="p-2 space-y-1 max-h-60 overflow-y-auto custom-scrollbar">
                                <label class="checkbox-item flex items-center px-3 py-2.5 hover:bg-blue-50 rounded-lg cursor-pointer transition-colors"><input type="checkbox" name="state" value="Baden-Wuerttemberg" class="w-4 h-4 text-blue-600 rounded border-slate-300" onchange="updateSelectedText()"><span class="ml-3 text-sm font-medium text-slate-700">Baden-Württemberg</span></label>
                                <label class="checkbox-item flex items-center px-3 py-2.5 hover:bg-blue-50 rounded-lg cursor-pointer transition-colors"><input type="checkbox" name="state" value="Bavaria" class="w-4 h-4 text-blue-600 rounded border-slate-300" onchange="updateSelectedText()"><span class="ml-3 text-sm font-medium text-slate-700">Bavaria</span></label>
                                <label class="checkbox-item flex items-center px-3 py-2.5 hover:bg-blue-50 rounded-lg cursor-pointer transition-colors"><input type="checkbox" name="state" value="Berlin" class="w-4 h-4 text-blue-600 rounded border-slate-300" onchange="updateSelectedText()"><span class="ml-3 text-sm font-medium text-slate-700">Berlin</span></label>
                                <label class="checkbox-item flex items-center px-3 py-2.5 hover:bg-blue-50 rounded-lg cursor-pointer transition-colors"><input type="checkbox" name="state" value="Brandenburg" class="w-4 h-4 text-blue-600 rounded border-slate-300" onchange="updateSelectedText()"><span class="ml-3 text-sm font-medium text-slate-700">Brandenburg</span></label>
                                <label class="checkbox-item flex items-center px-3 py-2.5 hover:bg-blue-50 rounded-lg cursor-pointer transition-colors"><input type="checkbox" name="state" value="Bremen" class="w-4 h-4 text-blue-600 rounded border-slate-300" onchange="updateSelectedText()"><span class="ml-3 text-sm font-medium text-slate-700">Bremen</span></label>
                                <label class="checkbox-item flex items-center px-3 py-2.5 hover:bg-blue-50 rounded-lg cursor-pointer transition-colors"><input type="checkbox" name="state" value="Hamburg" class="w-4 h-4 text-blue-600 rounded border-slate-300" onchange="updateSelectedText()"><span class="ml-3 text-sm font-medium text-slate-700">Hamburg</span></label>
                                <label class="checkbox-item flex items-center px-3 py-2.5 hover:bg-blue-50 rounded-lg cursor-pointer transition-colors"><input type="checkbox" name="state" value="Hesse" class="w-4 h-4 text-blue-600 rounded border-slate-300" onchange="updateSelectedText()"><span class="ml-3 text-sm font-medium text-slate-700">Hesse</span></label>
                                <label class="checkbox-item flex items-center px-3 py-2.5 hover:bg-blue-50 rounded-lg cursor-pointer transition-colors"><input type="checkbox" name="state" value="Mecklenburg-Vorpommern" class="w-4 h-4 text-blue-600 rounded border-slate-300" onchange="updateSelectedText()"><span class="ml-3 text-sm font-medium text-slate-700">Mecklenburg-Vorpommern</span></label>
                                <label class="checkbox-item flex items-center px-3 py-2.5 hover:bg-blue-50 rounded-lg cursor-pointer transition-colors"><input type="checkbox" name="state" value="Lower Saxony" class="w-4 h-4 text-blue-600 rounded border-slate-300" onchange="updateSelectedText()"><span class="ml-3 text-sm font-medium text-slate-700">Lower Saxony</span></label>
                                <label class="checkbox-item flex items-center px-3 py-2.5 hover:bg-blue-50 rounded-lg cursor-pointer transition-colors"><input type="checkbox" name="state" value="North Rhine-Westphalia" class="w-4 h-4 text-blue-600 rounded border-slate-300" onchange="updateSelectedText()"><span class="ml-3 text-sm font-medium text-slate-700">North Rhine-Westphalia</span></label>
                                <label class="checkbox-item flex items-center px-3 py-2.5 hover:bg-blue-50 rounded-lg cursor-pointer transition-colors"><input type="checkbox" name="state" value="Rheinland-Pfalz" class="w-4 h-4 text-blue-600 rounded border-slate-300" onchange="updateSelectedText()"><span class="ml-3 text-sm font-medium text-slate-700">Rhineland-Palatinate</span></label>
                                <label class="checkbox-item flex items-center px-3 py-2.5 hover:bg-blue-50 rounded-lg cursor-pointer transition-colors"><input type="checkbox" name="state" value="Saarland" class="w-4 h-4 text-blue-600 rounded border-slate-300" onchange="updateSelectedText()"><span class="ml-3 text-sm font-medium text-slate-700">Saarland</span></label>
                                <label class="checkbox-item flex items-center px-3 py-2.5 hover:bg-blue-50 rounded-lg cursor-pointer transition-colors"><input type="checkbox" name="state" value="Saxony" class="w-4 h-4 text-blue-600 rounded border-slate-300" onchange="updateSelectedText()"><span class="ml-3 text-sm font-medium text-slate-700">Saxony</span></label>
                                <label class="checkbox-item flex items-center px-3 py-2.5 hover:bg-blue-50 rounded-lg cursor-pointer transition-colors"><input type="checkbox" name="state" value="Saxony-Anhalt" class="w-4 h-4 text-blue-600 rounded border-slate-300" onchange="updateSelectedText()"><span class="ml-3 text-sm font-medium text-slate-700">Saxony-Anhalt</span></label>
                                <label class="checkbox-item flex items-center px-3 py-2.5 hover:bg-blue-50 rounded-lg cursor-pointer transition-colors"><input type="checkbox" name="state" value="Schleswig-Holstein" class="w-4 h-4 text-blue-600 rounded border-slate-300" onchange="updateSelectedText()"><span class="ml-3 text-sm font-medium text-slate-700">Schleswig-Holstein</span></label>
                                <label class="checkbox-item flex items-center px-3 py-2.5 hover:bg-blue-50 rounded-lg cursor-pointer transition-colors"><input type="checkbox" name="state" value="Thuringia" class="w-4 h-4 text-blue-600 rounded border-slate-300" onchange="updateSelectedText()"><span class="ml-3 text-sm font-medium text-slate-700">Thuringia</span></label>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="mt-12 pt-6 border-t border-slate-100 flex items-center justify-between">
                    <button onclick="document.getElementById('featureModal').classList.remove('hidden')" class="text-xs font-medium text-slate-400 hover:text-blue-600 transition-colors flex items-center gap-2">
                        <i class="far fa-lightbulb"></i> Request Source
                    </button>
                    <button id="runBtn" onclick="startScrape()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 px-8 rounded-xl shadow-lg shadow-blue-200 transition-all transform hover:-translate-y-0.5 active:scale-95 flex items-center justify-center gap-2.5">
                        <i class="fas fa-rocket"></i> Launch Scraper
                    </button>
                </div>
            </div>
        </div>

        <div id="drag-handle"></div>

        <div id="right-panel" class="bg-slate-50 flex flex-col h-full relative z-10" style="flex: 1; min-width: 400px;">
            
            <div class="px-6 py-4 border-b border-slate-200 bg-white flex justify-between items-center">
                <div>
                    <h2 class="text-sm font-bold text-slate-800 uppercase tracking-wide">Live Results</h2>
                    <p class="text-xs text-slate-400 mt-0.5">Real-time data feed</p>
                </div>
                <div class="flex gap-3">
                    <div id="counter" class="text-xs font-bold text-emerald-600 bg-emerald-50 px-3 py-1.5 rounded-full border border-emerald-100">0 Leads</div>
                    <button id="downloadBtn" class="hidden bg-slate-900 text-white text-xs font-bold px-4 py-1.5 rounded-lg shadow hover:bg-black transition-all"><i class="fas fa-download mr-2"></i> Export CSV</button>
                </div>
            </div>
            
            <div class="bg-slate-100 border-b border-slate-200 px-6 py-2 grid grid-cols-12 gap-4 text-[10px] font-bold text-slate-500 uppercase tracking-wider">
                <div class="col-span-4">Business Name</div>
                <div class="col-span-3">Location</div>
                <div class="col-span-3">Website / Email</div>
                <div class="col-span-2 text-right">Status</div>
            </div>

            <div class="flex-1 overflow-y-auto p-0 bg-slate-50/50">
                <div id="resultsTable" class="divide-y divide-slate-100">
                    <div class="px-6 py-10 text-center text-slate-400 text-sm" id="emptyState">
                        <i class="fas fa-inbox text-3xl mb-3 opacity-20"></i>
                        <p>Waiting for scrape to start...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="featureModal" class="hidden fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-[10000] flex items-center justify-center p-4 transition-opacity">
        <div class="bg-white rounded-2xl shadow-2xl max-w-md w-full p-8 transform transition-all scale-100">
            <div class="flex justify-between items-start mb-4">
                <h3 class="text-xl font-bold text-slate-900">Request Source</h3>
                <button onclick="document.getElementById('featureModal').classList.add('hidden')" class="text-slate-400 hover:text-slate-600"><i class="fas fa-times"></i></button>
            </div>
            <textarea id="featureText" class="w-full border border-slate-200 rounded-xl p-4 text-sm focus:border-blue-500 focus:outline-none mb-6 h-32 resize-none" placeholder="e.g. Scrape Instagram, YellowPages, or Trustpilot..."></textarea>
            <div class="flex justify-end gap-3">
                <button onclick="document.getElementById('featureModal').classList.add('hidden')" class="px-5 py-2.5 text-sm font-medium text-slate-500 hover:bg-slate-50 rounded-xl transition-colors">Cancel</button>
                <button onclick="submitFeature()" class="px-5 py-2.5 text-sm font-bold bg-blue-600 text-white rounded-xl hover:bg-blue-700 shadow-md transition-all">Submit Request</button>
            </div>
        </div>
    </div>

    <script>
        // DRAG HANDLE LOGIC
        const handle = document.getElementById('drag-handle');
        const leftPanel = document.getElementById('left-panel');
        const container = document.getElementById('split-container');
        let isDragging = false;
        handle.addEventListener('mousedown', () => { isDragging = true; document.body.style.cursor = 'col-resize'; });
        document.addEventListener('mouseup', () => { isDragging = false; document.body.style.cursor = 'default'; });
        document.addEventListener('mousemove', (e) => { if (isDragging) { 
            const newWidth = ((e.clientX - container.getBoundingClientRect().left) / container.getBoundingClientRect().width) * 100;
            if (newWidth > 20 && newWidth < 80) leftPanel.style.width = `${newWidth}%`;
        }});

        // APP LOGIC
        let pollingInterval = null;
        setTimeout(() => { const l=document.getElementById('loader'); if(l) l.style.display='none'; }, 3300);

        window.onload = function() {
            updateLimitLabel();
            document.addEventListener('click', function(e) {
                if(!e.target.closest('#multiDropdownMenu') && !e.target.closest('#stateSection')) document.getElementById('multiDropdownMenu').classList.remove('open');
                if(!e.target.closest('#countryDropdownMenu') && !e.target.closest('.relative')) document.getElementById('countryDropdownMenu').classList.remove('open');
            });
        };

        async function submitFeature() {
            const t = document.getElementById('featureText').value; if(!t) return;
            try { await fetch('/request-feature', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({feature_text:t}) }); alert("Request Sent!"); document.getElementById('featureModal').classList.add('hidden'); } catch(e){}
        }

        function toggleUnlimited() {
            const chk = document.getElementById('unlimitedCheck');
            const inp = document.getElementById('limitValue');
            if(chk.checked) {
                inp.disabled = true;
                inp.value = '';
                inp.placeholder = '∞ Unlimited';
                inp.classList.add('bg-slate-100', 'text-slate-400');
            } else {
                inp.disabled = false;
                inp.value = '50';
                inp.placeholder = '50';
                inp.classList.remove('bg-slate-100', 'text-slate-400');
            }
        }

        function toggleCountryDropdown() { document.getElementById('countryDropdownMenu').classList.toggle('open'); }
        function updateSelectedCountries() {
            const c=document.querySelectorAll('input[name="country"]:checked');
            document.getElementById('selectedCountriesText').innerText=c.length===0?"-- Select --":`${c.length} Selected`;
            if(Array.from(c).map(x=>x.value).includes('de')) document.getElementById('stateSection').classList.remove('hidden'); else document.getElementById('stateSection').classList.add('hidden');
        }
        function getSelectedCountries(){ return Array.from(document.querySelectorAll('input[name="country"]:checked')).map(x=>x.value); }

        function toggleMultiDropdown() { document.getElementById('multiDropdownMenu').classList.toggle('open'); }
        function updateSelectedText() { const c=document.querySelectorAll('input[name="state"]:checked').length; document.getElementById('selectedStatesText').innerText=c===0?"-- All --":`${c} Selected`; }
        function getSelectedStates(){ return Array.from(document.querySelectorAll('input[name="state"]:checked')).map(x=>x.value); }
        
        function updateLimitLabel(){ const m=document.getElementById('limitMode').value; document.getElementById('limitLabel').innerText=m==='leads'?"Target Leads":"Max Credits"; document.getElementById('limitValue').placeholder=m==='leads'?"50":"100"; }

        // --- TABLE ROW INJECTOR ---
        function addTableRow(logText) {
            document.getElementById('emptyState').style.display = 'none';
            const table = document.getElementById('resultsTable');
            
            // Parse log text "Found: Title" -> Title
            let title = logText.replace("+ ", "").replace("Found ", "").replace("📧 Found Email: ", "");
            let status = logText.includes("Email") ? "EMAIL FOUND" : "FOUND";
            let statusColor = logText.includes("Email") ? "bg-purple-100 text-purple-700" : "bg-emerald-100 text-emerald-700";
            
            const row = document.createElement('div');
            row.className = "px-6 py-3 border-b border-slate-100 bg-white hover:bg-slate-50 transition-colors grid grid-cols-12 gap-4 items-center animate-row";
            row.innerHTML = `
                <div class="col-span-4 font-medium text-sm text-slate-700 truncate" title="${title}">${title}</div>
                <div class="col-span-3 text-xs text-slate-500 truncate"><i class="fas fa-map-marker-alt mr-1 text-slate-300"></i> Unknown</div>
                <div class="col-span-3 text-xs text-blue-500 truncate">Checking...</div>
                <div class="col-span-2 text-right"><span class="${statusColor} text-[10px] font-bold px-2 py-0.5 rounded">${status}</span></div>
            `;
            table.insertBefore(row, table.firstChild);
        }

        async function startScrape() {
            document.getElementById('resultsTable').innerHTML = '<div class="px-6 py-10 text-center text-slate-400 text-sm" id="emptyState"><i class="fas fa-sync fa-spin text-3xl mb-3 opacity-20"></i><p>Initializing Scraper...</p></div>';
            document.getElementById('downloadBtn').classList.add('hidden');
            
            const btn=document.getElementById('runBtn'); btn.disabled=true; btn.classList.add('opacity-75'); btn.innerHTML='<i class="fas fa-spinner fa-spin"></i> Processing...';
            
            try {
                const t=document.getElementById('searchTerm').value; const c=getSelectedCountries();
                if(!t) throw new Error("Enter keyword"); if(c.length===0) throw new Error("Select country");
                
                // CHECK UNLIMITED
                const limitVal = document.getElementById('unlimitedCheck').checked ? 1000000 : document.getElementById('limitValue').value;

                await fetch('/run-scrape',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
                    search_term:t, limit_value:limitVal, limit_mode:document.getElementById('limitMode').value,
                    match_type:'rough', region:c, sub_region:getSelectedStates(), skip_no_website:false,
                    scrape_emails:false, min_rating:0
                })});
                startPolling();
            } catch(e){ alert(e.message); btn.disabled=false; btn.classList.remove('opacity-75'); btn.innerHTML='<i class="fas fa-rocket"></i> Launch Scraper'; }
        }

        function startPolling(){
            if(pollingInterval) clearInterval(pollingInterval);
            pollingInterval=setInterval(async()=>{
                const r=await fetch('/status'); const s=await r.json();
                document.getElementById('counter').innerText=`${s.total_leads} LEADS`;
                
                // Inject new rows
                if(s.new_logs.length) s.new_logs.forEach(m => addTableRow(m));

                if(!s.is_running){ 
                    clearInterval(pollingInterval); 
                    document.getElementById('runBtn').disabled=false; 
                    document.getElementById('runBtn').classList.remove('opacity-75'); 
                    document.getElementById('runBtn').innerHTML='<i class="fas fa-rocket"></i> Launch Scraper'; 
                    if(s.total_leads>0){ 
                        const dlBtn = document.getElementById('downloadBtn');
                        dlBtn.classList.remove('hidden'); 
                        dlBtn.onclick=()=>window.location.href=`/download/${s.current_filename}`; 
                    } 
                }
            },2000);
        }
    </script>
</body>
</html>
